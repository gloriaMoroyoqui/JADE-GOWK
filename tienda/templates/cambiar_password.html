{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-sm">
                <h3 class="text-center">Modificar Contraseña</h3>
                <p class="text-muted text-center">Por seguridad, introduce tu contraseña actual antes de cambiarla.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark btn-block">Confirmar Cambio</button>
                    <a href="{% url 'perfil' %}" class="btn btn-light btn-block text-center mt-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
