<div style="clear: both; width: 100%; block-size: auto;"></div>

<h1 class="titulo-seccion">Productos</h1>

<style>
    /* Titulo principal */
    .titulo-seccion {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 20px;
        font-family: Arial, sans-serif;
    }

    /* EL CONTENEDOR PRINCIPAL: Ahora con configuración explícita */
    .catalogo-grid {
        display: grid !important; /* El !important evita que Django u otro CSS lo pise */
        
        /* Forzamos 3 columnas fijas en pantallas normales. Si quieres 4, cambia el 3 por un 4 */
        grid-template-columns: repeat(3, 1fr) !important; 
        
        gap: 25px !important;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto !important;
        box-sizing: border-box;
    }

    /* La tarjeta de cada producto */
    .producto-tarjeta {
        background-color: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* Contenedor de la imagen */
    .imagen-contenedor {
        width: 100%;
        height: 250px;
        display: flex !important;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-bottom: 15px;
        background-color: #f9f9f9;
        border-radius: 4px;
    }

    /* Imagen responsiva */
    .imagen-contenedor img {
        max-width: 100%;
        max-height: 100%;
        object-fit: cover;
    }

    /* Textos */
    .producto-tarjeta h2 {
        font-size: 18px;
        font-family: Arial, sans-serif;
        margin: 10px 0 5px 0;
        color: #333;
    }

    .descripcion {
        font-size: 14px;
        font-family: Arial, sans-serif;
        color: #666;
        height: 40px;
        overflow: hidden;
        margin: 5px 0;
    }

    .precio {
        font-size: 16px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        color: #111;
        margin: 10px 0;
    }

    .talla {
        font-size: 13px;
        font-family: Arial, sans-serif;
        color: #888;
        margin-bottom: 5px;
    }

    /* Cambiar a 1 sola columna si lo ves desde un celular */
    @media (max-width: 768px) {
        .catalogo-grid {
            grid-template-columns: 1fr !important;
        }
    }
</style>

<div class="catalogo-grid">

    {% for producto in productos %}
        <div class="producto-tarjeta">
            
            <div class="imagen-contenedor">
                {% if producto.imagen %}
                    <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}">
                {% else %}
                    <div style="color: #aaa; font-size: 12px; font-family: Arial;">Sin imagen</div>
                {% endif %}
            </div>

            <h2>{{ producto.nombre }}</h2>
            <p class="descripcion">{{ producto.descripcion }}</p>
            <p class="precio">${{ producto.precio }}</p>
            <p class="talla">Talla: {{ producto.talla }}</p>
            
        </div>
    {% endfor %}

</div>
