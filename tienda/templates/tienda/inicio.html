{% for producto in productos %}

{% if producto.imagen %}

    <img src="{{ producto.imagen.url }}" width="250">
{% endif %} 

<h2>{{ producto.nombre }}</h2>

<p>{{ producto.descripcion }}</p>

<p>Talla: {{ producto.talla }}</p>

<p>Precio: ${{ producto.precio }}</p>

<p>Categoría: {{ producto.categoria }}</p>

<hr>

{% endfor %}
