<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | JADE & GOWK</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4 border-0">
                    <div class="text-center mb-4">
                        <h2 class="font-weight-bold">JADE & GOWK</h2>
                        <p class="text-muted">Únete a nuestro Marketplace de ropa</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="form-group">
                                <label class="font-weight-bold">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <small class="text-danger">{{ field.errors|striptags }}</small>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-dark btn-block font-weight-bold py-2 mt-4">CREAR CUENTA</button>
                    </form>

                    <hr>
                    <div class="text-center">
                        <p class="mb-0 text-muted">¿Ya tienes una cuenta?</p>
                        <a href="{% url 'login' %}" class="text-dark font-weight-bold">Iniciar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
