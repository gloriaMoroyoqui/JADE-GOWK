<h1>Productos</h1>

<style>
    /* Estilos para el contenedor del producto */
    .producto-contenedor {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 columnas iguales (Izquierda: Imagen, Derecha: Texto) */
        gap: 40px;                     /* Espacio de separación entre columnas */
        max-width: 900px;              /* Ancho máximo para que no se estire de más */
        margin: 30px auto;             /* Centra el contenedor en la página y da espacio arriba/abajo */
        padding: 20px;
        align-items: center;           /* Centra verticalmente la imagen con el texto */
    }

    /* Asegura que la imagen se adapte bien a su columna */
    .producto-imagen img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;            /* Bordes ligeramente redondeados */
    }

    /* Estilos para limpiar el diseño de los textos */
    .producto-detalles h2 {
        margin-top: 0;
        font-size: 24px;
    }
    .producto-detalles p {
        margin: 8px 0;
        font-size: 16px;
    }
    .precio {
        font-size: 18px;
        font-weight: bold;
        color: #2c3e50;
    }
</style>

{% for producto in productos %}

<div class="producto-contenedor">
    
    <div class="producto-imagen">
        {% if producto.imagen %}
            <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}">
        {% else %}
            <img src="/media/productos/default.png" alt="Sin imagen disponible">
        {% endif %}
    </div>

    <div class="producto-detalles">
        <h2>{{ producto.nombre }}</h2>
        <p>{{ producto.descripcion }}</p>
        <p class="precio">${{ producto.precio }}</p>
        <p><strong>Talla:</strong> {{ producto.talla }}</p>
    </div>

</div>

<hr style="max-width: 900px; margin: 0 auto; border: 0; border-top: 1px solid #eee;">

{% endfor %}
